ssh:
  user: root
  port: 22
  keys:
    - "~/.ssh/blog_key"

service: blog

image: alexandresilvestri/blog

servers:
  web:
    hosts:
      - 146.190.220.255

deploy_timeout: 120

proxy:
  ssl: true
  host: alexandresilvestri.com.br

registry:
  username: alexandresilvestri
  password:
     - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - DATABASE_URL
    - RESEND_API_KEY
  clear:
    RAILS_ENV: production
    SOLID_QUEUE_IN_PUMA: true
    RAILS_LOG_LEVEL: info

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "blog-production:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

accessories:
  db:
    image: postgres:18
    host: 146.190.220.255
    port: "5432"
    cmd: postgres -c shared_buffers=256MB -c work_mem=8MB -c max_connections=30 -c effective_cache_size=512MB
    env:
      clear:
        POSTGRES_USER: alexandre
        POSTGRES_DB: blog_production
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - "blog-pgdata:/var/lib/postgresql"
