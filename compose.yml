services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: alexandre
      POSTGRES_DB: blog_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql
      - ./script/db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alexandre -d blog_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    command: sh -c "rm -f tmp/pids/server.pid && exec bin/rails server -b 0.0.0.0"
    environment:
      DATABASE_URL: postgres://alexandre@db:5432/blog_dev
      RAILS_ENV: development
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    tty: true
    stdin_open: true

  css:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    command: ["bin/rails", "tailwindcss:watch"]
    environment:
      RAILS_ENV: development
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    depends_on:
      - app
    tty: true

volumes:
  pgdata:
  bundle:
